<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Swift on Windows Internals Guide</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    </head>
    <body class="bg-gray-50 text-gray-900 min-h-screen p-8">
        <div id="root"></div>

        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.production.min.js"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
        ></script>
        
        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.js"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        ></script>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        
        <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

        <script type="text/babel">
            const { useState, useEffect, useRef } = React;

            function MarkdownViewer() {
                const [content, setContent] = useState("");
                const [loading, setLoading] = useState(true);
                const [error, setError] = useState(null);
                const containerRef = useRef(null);

                const username = "designsbyblanc";
                const repo = "swift_on_windows_docs";
                const branch = "main";
                const filePath = "README.md"; 

                // Fetch Markdown Content
                useEffect(() => {
                    const rawUrl = `https://raw.githubusercontent.com/${username}/${repo}/${branch}/${filePath}`;

                    fetch(rawUrl)
                        .then((response) => {
                            if (!response.ok) {
                                throw new Error(`Failed to fetch file: ${response.statusText}`);
                            }
                            return response.text();
                        })
                        .then((markdownText) => {
                            const htmlContent = marked.parse(markdownText);
                            setContent(htmlContent);
                            setLoading(false);
                        })
                        .catch((err) => {
                            setError(err.message);
                            setLoading(false);
                        });
                }, []);

                // Process and render Mermaid diagrams whenever content shifts
                useEffect(() => {
                    if (loading || error || !content) return;

                    try {
                        // 1. Initialize Mermaid configuration
                        mermaid.initialize({ 
                            startOnLoad: false,
                            theme: 'default',
                            securityLevel: 'loose' 
                        });

                        // 2. Find standard markdown-parsed mermaid blocks inside the container
                        const targetNodes = containerRef.current.querySelectorAll("pre code.language-mermaid");
                        
                        targetNodes.forEach((codeNode) => {
                            const preNode = codeNode.parentElement;
                            
                            // Create a proper Mermaid container div
                            const mermaidDiv = document.createElement("div");
                            mermaidDiv.className = "mermaid my-6 flex justify-center";
                            mermaidDiv.textContent = codeNode.textContent;
                            
                            // Replace the <pre><code> block with our new <div>
                            preNode.parentNode.replaceChild(mermaidDiv, preNode);
                        });

                        // 3. Command Mermaid to parse and render the newly injected divs
                        mermaid.run({
                            nodes: containerRef.current.querySelectorAll(".mermaid")
                        });
                    } catch (mermaidError) {
                        console.error("Mermaid execution error:", mermaidError);
                    }
                }, [content, loading, error]);

                if (loading) {
                    return <div className="text-center text-gray-500 font-semibold mt-10">Loading documentation...</div>;
                }

                if (error) {
                    return (
                        <div className="max-w-2xl mx-auto mt-10 bg-red-50 border border-red-200 text-red-700 p-4 rounded-lg">
                            <p className="font-bold">Error loading content:</p>
                            <p>{error}</p>
                        </div>
                    );
                }

                return (
                    <main className="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div 
                            ref={containerRef}
                            className="prose max-w-full break-words
                                       [&_h1]:text-3xl [&_h1]:font-bold [&_h1]:mb-4 [&_h1]:border-b [&_h1]:pb-2
                                       [&_h2]:text-2xl [&_h2]:font-semibold [&_h2]:mt-6 [&_h2]:mb-3
                                       [&_p]:mb-4 [&_p]:leading-relaxed
                                       [&_ul]:list-disc [&_ul]:pl-6 [&_ul]:mb-4
                                       [&_code]:bg-gray-100 [&_code]:px-1 [&_code]:py-0.5 [&_code]:rounded [&_code]:text-sm
                                       [&_pre]:bg-gray-100 [&_pre]:p-4 [&_pre]:rounded-lg [&_pre]:mb-4 [&_pre]:overflow-x-auto [&_pre]:max-w-full
                                       [&_table]:w-full [&_table]:block [&_table]:overflow-x-auto [&_table]:mb-4"
                            dangerouslySetInnerHTML={{ __html: content }} 
                        />
                    </main>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById("root"));
            root.render(<MarkdownViewer />);
        </script>
    </body>
</html>
